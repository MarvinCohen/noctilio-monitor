# .github/workflows/monitor.yml
# GitHub Actions — Lance le monitoring Noctilio toutes les 6 heures
# et persiste le cache des posts déjà vus entre les runs.

name: Noctilio Monitor

on:
  # ── Déclenchement automatique toutes les 6 heures ──
  schedule:
    - cron: "0 7,13,19,23 * * *"  # 7h, 13h, 19h, 23h UTC (= 9h, 15h, 21h, 1h Paris)

  # ── Déclenchement manuel depuis l'interface GitHub ──
  workflow_dispatch:
    inputs:
      debug:
        description: "Mode debug (affiche tous les posts, pas seulement les pertinents)"
        required: false
        default: "false"

jobs:
  monitor:
    name: Scrape & Alert
    runs-on: ubuntu-latest

    # Permissions pour écrire le cache dans le repo
    permissions:
      contents: write

    steps:
      # ── 1. Checkout du repo ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Python ──
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Installation des dépendances ──
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Restauration du cache des posts déjà vus ──
      # On stocke seen_posts.json dans le repo pour persistance entre les runs
      - name: Restore seen posts cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Le fichier sera créé automatiquement par monitor.py s'il n'existe pas

      # ── 5. Lancement du monitoring ──
      - name: Run monitor
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DEBUG: ${{ github.event.inputs.debug }}
        run: python monitor.py

      # ── 6. Commit du cache mis à jour ──
      # Permet de ne pas re-alerter les mêmes posts au prochain run
      - name: Commit updated cache
        run: |
          git add seen_posts.json || true
          git diff --staged --quiet || git commit -m "chore: mise à jour cache monitoring [skip ci]"
          git push || true
